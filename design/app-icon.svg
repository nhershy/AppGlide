<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- background: matches the original tile gradient -->
    <linearGradient id="bg" x1="0" y1="100" x2="0" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#41454F"/>
      <stop offset="1" stop-color="#202329"/>
    </linearGradient>
    <!-- motion streaks fade off to the left -->
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#66748A" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#66748A" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#697790"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="tile">
      <rect x="100" y="100" width="824" height="824" rx="184"/>
    </clipPath>
    <!-- hand: 3 fingers + thumb, slimmed wrist, cropped at bottom -->
    <path id="hand" d="M 425 940
      C 390 830 330 740 296 668
      C 278 630 278 596 300 578
      C 330 562 358 598 370 636
      C 377 656 383 666 391 668
      C 389 560 388 460 388 366
      C 388 288 497 288 497 366
      C 501 470 504 550 507 604
      Q 513 622 519 604
      C 526 500 534 380 540 318
      C 540 240 651 240 651 318
      C 646 420 637 540 630 600
      Q 639 620 648 602
      C 657 540 673 470 682 436
      C 682 360 790 360 790 436
      C 787 500 775 560 764 618
      C 770 660 771 700 768 740
      C 763 820 738 890 715 940
      Z"/>
  </defs>

  <!-- tile -->
  <rect x="100" y="100" width="824" height="824" rx="184" fill="url(#bg)"/>
  <g clip-path="url(#tile)">

    <!-- motion streaks -->
    <rect x="168" y="215" width="288" height="36" rx="18" fill="url(#streak)"/>
    <rect x="148" y="295" width="248" height="36" rx="18" fill="url(#streak)"/>
    <rect x="186" y="375" width="152" height="36" rx="18" fill="url(#streak)"/>

    <!-- soft shadow behind the hand, as in the original -->
    <use href="#hand" transform="translate(6,10)" fill="#000000" opacity="0.32" filter="url(#soft)"/>

    <!-- hand -->
    <use href="#hand" fill="#F0CB9C"/>

    <!-- fingertip pads -->
    <g fill="#FAE7CA">
      <rect x="410" y="344" width="66" height="56" rx="26"/>
      <rect x="565" y="288" width="63" height="62" rx="28"/>
      <rect x="705" y="393" width="67" height="62" rx="28"/>
    </g>
  </g>
</svg>
